services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  migrate:
    build:
      context: .
    image: agente-barbearia:production
    command: ["alembic", "upgrade", "head"]
    user: app
    env_file:
      - path: ${APP_CONTAINER_ENV_FILE:-.env.production}
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  api:
    build:
      context: .
    image: agente-barbearia:production
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log", "--log-level", "warning"]
    user: app
    env_file:
      - path: ${APP_CONTAINER_ENV_FILE:-.env.production}
        required: false
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  inbound-worker:
    build:
      context: .
    image: agente-barbearia:production
    command: ["python", "-m", "app.workers.inbound_message_worker"]
    user: app
    env_file:
      - path: ${APP_CONTAINER_ENV_FILE:-.env.production}
        required: false
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  outbound-worker:
    build:
      context: .
    image: agente-barbearia:production
    command: ["python", "-m", "app.workers.outbound_message_worker"]
    user: app
    env_file:
      - path: ${APP_CONTAINER_ENV_FILE:-.env.production}
        required: false
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
