services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: agente_barbearia_test
      POSTGRES_USER: agente_barbearia_test
      POSTGRES_PASSWORD: agente_barbearia_test_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "${TEST_POSTGRES_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agente_barbearia_test -d agente_barbearia_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
